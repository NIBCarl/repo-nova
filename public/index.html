<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Novaluxia</title>
  <meta name="description" content="Novaluxia - Beyond Shopping, Seamless Living">
  <link rel="icon" href="https://novaluxia.top/static/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">

    <!-- ====== HEADER WITH GRADIENT & LOGO ====== -->
    <div class="login-header">
      <div class="logo-container">
        <!-- Real Novaluxia Logo -->
        <img class="logo-icon" src="https://novaluxia.top/static/logo.png" alt="Novaluxia Logo" draggable="false">
      </div>
    </div>

    <!-- ====== LOGIN FORM ====== -->
    <div class="login-form-container">

      <!-- Phone Number Field -->
      <div class="field-group">
        <label class="field-label">Phone Number</label>
        <div class="field-input-wrapper">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          <span class="country-code">+63</span>
          <input type="number" id="phoneInput" class="field-input" placeholder="Please enter phone number" maxlength="10" autocomplete="off">
        </div>
      </div>

      <!-- Password Field -->
      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-input-wrapper">
          <span class="field-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <circle cx="12" cy="16" r="1"/>
            </svg>
          </span>
          <input type="password" id="passwordInput" class="field-input" placeholder="Please enter password" maxlength="140" autocomplete="off">
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
            <!-- Eye closed (default - password hidden) -->
            <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <!-- Eye open (password visible) -->
            <svg id="eyeOpen" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember Password & Forgot Password -->
      <div class="options-row">
        <label class="remember-password">
          <input type="checkbox" id="rememberCheckbox">
          Remember password
        </label>
        <span class="forgot-password">Forgot Password？</span>
      </div>

      <!-- Login Button -->
      <button type="button" id="loginBtn" class="login-btn">
        <span class="btn-spinner"></span>
        <span class="btn-text">Login</span>
      </button>

      <!-- Agreement -->
      <div class="agreement-row">
        <div class="custom-checkbox checked" id="agreementCheckbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div>Read and Agree <a href="javascript:void(0)">User Agreement</a> and <a href="javascript:void(0)">Privacy Policy</a></div>
      </div>

      <!-- Register -->
      <div class="register-row">
        Don't have an account? You can <a href="javascript:void(0)">Register Now</a>
      </div>

    </div>
  </div>

  <!-- NO Supabase CDN — all logic goes through server API -->
  <script src="js/login.js"></script>
</body>
</html>
